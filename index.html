<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joji Milano 2026</title>
    <meta
      name="description"
      content="Itinerario Joji Milano 2026 caricato da markdown in tempo reale."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #cec08a;
        --paper: #f2e7bc;
        --ink: #241f10;
        --ink-soft: #5f5332;
        --accent: #6f4a08;
        --accent-soft: #c8a152;
        --line: #a28d52;
        --panel-shadow: 0 22px 50px rgba(31, 24, 8, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 12%, #e5cc74 0%, transparent 34%),
          radial-gradient(circle at 87% 13%, #a79860 0%, transparent 36%),
          radial-gradient(circle at 14% 88%, #8c8256 0%, transparent 30%),
          linear-gradient(162deg, #e2d29a 0%, var(--bg) 52%, #bfae73 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.42;
        background-image: radial-gradient(circle at 1px 1px, #6f6543 1px, transparent 0);
        background-size: 3px 3px;
        mix-blend-mode: multiply;
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 2px;
        text-underline-offset: 3px;
      }

      .shell {
        width: min(1080px, calc(100% - 1.2rem));
        margin: 0 auto;
        padding: 1rem 0 2.2rem;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        border: 1px solid #9c8551;
        background:
          linear-gradient(125deg, rgba(250, 238, 190, 0.96), rgba(233, 213, 149, 0.94)),
          linear-gradient(90deg, #f4e4ae, #cebb80);
        box-shadow: var(--panel-shadow);
        padding: clamp(1rem, 2vw, 1.35rem);
      }

      .hero::after {
        content: "JOJI MOOD";
        position: absolute;
        right: 1rem;
        top: 0.8rem;
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: 1.15rem;
        letter-spacing: 0.09em;
        color: rgba(68, 50, 12, 0.62);
      }

      .eyebrow {
        margin: 0;
        font-size: 0.78rem;
        letter-spacing: 0.15em;
        font-weight: 800;
        color: #4d3908;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 0.3rem 0 0;
        font-family: "Bebas Neue", Impact, sans-serif;
        letter-spacing: 0.04em;
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 0.95;
      }

      .hero p {
        margin: 0.5rem 0 0;
        max-width: 62ch;
        color: var(--ink-soft);
      }

      .layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 1rem;
        margin-top: 1rem;
      }

      .panel {
        border-radius: 20px;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--paper) 92%, #f8f0cc 8%);
        box-shadow: var(--panel-shadow);
      }

      .music-panel {
        margin-top: 1rem;
        padding: 1rem;
      }

      .music-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 0.8rem;
        flex-wrap: wrap;
        margin-bottom: 0.8rem;
      }

      .music-head h2 {
        margin: 0;
        font-family: "Bebas Neue", Impact, sans-serif;
        letter-spacing: 0.05em;
        font-size: 1.65rem;
      }

      .music-head p {
        margin: 0;
        color: var(--ink-soft);
        font-size: 0.93rem;
      }

      .music-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 0.75rem;
      }

      .music-card {
        border: 1px solid #ad9051;
        border-radius: 14px;
        background: linear-gradient(155deg, #f7ebc4, #d5bf82);
        padding: 0.75rem;
      }

      .music-card h3 {
        margin: 0;
        font-size: 1rem;
        line-height: 1.2;
      }

      .music-meta {
        margin: 0.35rem 0 0.55rem;
        color: var(--ink-soft);
        font-size: 0.88rem;
      }

      .music-card audio {
        width: 100%;
      }

      .music-open {
        display: inline-block;
        margin-top: 0.55rem;
        font-size: 0.88rem;
      }

      .music-loading,
      .music-error,
      .music-links {
        margin: 0;
      }

      .music-loading,
      .music-error {
        color: var(--ink-soft);
      }

      .music-links {
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }

      .toc-panel {
        position: sticky;
        top: 0.75rem;
        align-self: start;
        padding: 1rem 0.95rem;
      }

      .toc-panel h2 {
        margin: 0 0 0.65rem;
        font-family: "Bebas Neue", Impact, sans-serif;
        letter-spacing: 0.05em;
        font-size: 1.35rem;
      }

      .toc-list {
        display: grid;
        gap: 0.38rem;
      }

      .toc-list a {
        display: block;
        text-decoration: none;
        color: var(--ink);
        padding: 0.3rem 0.5rem;
        border-radius: 10px;
        border-left: 3px solid transparent;
        transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease;
      }

      .toc-list a:hover,
      .toc-list a:focus-visible {
        border-left-color: var(--accent);
        background: #e7d295;
        color: #4c3405;
      }

      .toc-level-2,
      .toc-level-3 {
        font-size: 0.95rem;
      }

      .toc-level-3 {
        opacity: 0.85;
      }

      .content {
        padding: clamp(1rem, 2vw, 1.45rem);
        overflow-wrap: anywhere;
      }

      .content > * {
        animation: rise 0.38s ease both;
      }

      .content h1,
      .content h2,
      .content h3 {
        font-family: "Bebas Neue", Impact, sans-serif;
        letter-spacing: 0.03em;
        line-height: 1;
        margin: 1.1rem 0 0.55rem;
        scroll-margin-top: 0.8rem;
      }

      .content h1 {
        margin-top: 0;
        font-size: clamp(1.8rem, 2vw + 1rem, 2.35rem);
      }

      .content h2 {
        font-size: clamp(1.45rem, 1.3vw + 1rem, 1.85rem);
      }

      .content h3 {
        font-size: 1.25rem;
      }

      .content p,
      .content li {
        font-size: 1rem;
        line-height: 1.62;
      }

      .content ul,
      .content ol {
        margin: 0.45rem 0 0.8rem;
        padding-left: 1.2rem;
      }

      .content li {
        margin: 0.22rem 0;
      }

      .task-item {
        list-style: none;
        margin-left: -1.05rem;
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .task-item input[type="checkbox"] {
        margin-top: 0.35rem;
        accent-color: var(--accent);
        pointer-events: none;
      }

      .content code {
        font-family: "Consolas", "Menlo", monospace;
        background: #ddca90;
        border: 1px solid #ab8f4f;
        border-radius: 7px;
        padding: 0.07rem 0.3rem;
        font-size: 0.92em;
      }

      .status {
        margin-top: 0.9rem;
        color: var(--ink-soft);
        font-size: 0.92rem;
      }

      .error {
        border: 1px solid #aa7f41;
        border-radius: 13px;
        background: #f2e1ae;
        color: #543c08;
        padding: 0.8rem;
      }

      .to-top {
        position: fixed;
        right: 0.9rem;
        bottom: 0.9rem;
        width: 43px;
        height: 43px;
        border: 1px solid #8f7334;
        border-radius: 999px;
        background: linear-gradient(165deg, #f4e4ae, #c8af67);
        color: #473103;
        font-size: 1.1rem;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(52, 39, 10, 0.32);
        z-index: 25;
        opacity: 0;
        transform: translateY(10px) scale(0.96);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .to-top.is-visible {
        opacity: 0.95;
        pointer-events: auto;
        transform: translateY(0) scale(1);
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }

        .toc-panel {
          position: static;
          order: -1;
        }

        .hero::after {
          right: 0.85rem;
          top: 0.7rem;
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="hero panel">
        <p class="eyebrow">Live Trip Planner</p>
        <h1>Joji Milano 2026</h1>
        <p>
          Questa pagina legge il file markdown locale e lo visualizza in automatico,
          con un look piu vicino all'atmosfera Joji.
        </p>
      </header>

      <section class="music-panel panel" aria-label="Player canzoni di Joji">
        <div class="music-head">
          <h2>Joji Player</h2>
          <p>Anteprime audio riproducibili direttamente da qui.</p>
        </div>
        <div id="musicGrid" class="music-grid">
          <p class="music-loading">Caricamento brani in corso...</p>
        </div>
      </section>

      <main class="layout">
        <aside class="toc-panel panel" aria-label="Indice rapido">
          <h2>Tracklist</h2>
          <nav id="toc" class="toc-list"></nav>
        </aside>

        <article id="content" class="content panel" aria-live="polite"></article>
      </main>

      <p id="status" class="status">Caricamento markdown in corso...</p>
    </div>

    <button id="toTopBtn" class="to-top" type="button" aria-label="Torna in cima">
      ^
    </button>

    <script>
      const NOTE_FILE = "Joji Milano 2026";
      const JOJI_TRACK_ENDPOINT =
        "https://itunes.apple.com/search?term=joji&entity=song&limit=40&country=US";
      const JOJI_SEED_TITLES = [
        "Glimpse of Us",
        "Slow Dancing in the Dark",
        "Sanctuary",
        "Die For You",
        "Like You Do",
        "YUKON (INTERLUDE)"
      ];

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function slugify(text) {
        return String(text || "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9\s-]/g, "")
          .trim()
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-") || "sezione";
      }

      function normalizeText(text) {
        return String(text || "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, " ")
          .trim();
      }

      function formatDurationMs(milliseconds) {
        const totalSeconds = Math.max(0, Math.round(Number(milliseconds || 0) / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = String(totalSeconds % 60).padStart(2, "0");
        return minutes + ":" + seconds;
      }

      function sanitizeUrl(rawUrl) {
        try {
          const url = new URL(rawUrl, window.location.href);
          const allowed = ["http:", "https:", "mailto:", "tel:"];
          return allowed.indexOf(url.protocol) >= 0 ? url.href : "#";
        } catch (error) {
          return "#";
        }
      }

      function parseInline(rawText) {
        const codeSegments = [];
        const withPlaceholders = String(rawText).replace(/`([^`]+)`/g, function (_, code) {
          codeSegments.push(code);
          return "__INLINE_CODE_" + (codeSegments.length - 1) + "__";
        });

        let html = escapeHtml(withPlaceholders);

        html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function (_, alt, src) {
          return '<img src="' + escapeHtml(sanitizeUrl(src)) + '" alt="' + escapeHtml(alt) + '" loading="lazy" />';
        });

        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, label, href) {
          const safeHref = escapeHtml(sanitizeUrl(href));
          return '<a href="' + safeHref + '" target="_blank" rel="noopener noreferrer">' + label + "</a>";
        });

        html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");

        html = html.replace(/__INLINE_CODE_(\d+)__/g, function (_, index) {
          const code = codeSegments[Number(index)] || "";
          return "<code>" + escapeHtml(code) + "</code>";
        });

        return html;
      }

      function parseMarkdown(markdownRaw) {
        const lines = String(markdownRaw || "").replace(/\r\n/g, "\n").split("\n");
        const html = [];
        const paragraph = [];
        const listStack = [];

        function closeParagraph() {
          if (!paragraph.length) {
            return;
          }
          html.push("<p>" + parseInline(paragraph.join(" ")) + "</p>");
          paragraph.length = 0;
        }

        function closeCurrentListItem() {
          const top = listStack[listStack.length - 1];
          if (top && top.liOpen) {
            html.push("</li>");
            top.liOpen = false;
          }
        }

        function openList(type, indent) {
          html.push("<" + type + ">");
          listStack.push({ type: type, indent: indent, liOpen: false });
        }

        function closeTopList() {
          const top = listStack[listStack.length - 1];
          if (!top) {
            return;
          }
          closeCurrentListItem();
          html.push("</" + top.type + ">");
          listStack.pop();
        }

        function closeAllLists() {
          while (listStack.length) {
            closeTopList();
          }
        }

        for (let i = 0; i < lines.length; i += 1) {
          const line = lines[i];

          if (!line.trim()) {
            closeParagraph();
            closeAllLists();
            continue;
          }

          const headingMatch = line.match(/^(#{1,6})\s+(.+)$/);
          if (headingMatch) {
            closeParagraph();
            closeAllLists();
            const depth = headingMatch[1].length;
            html.push("<h" + depth + ">" + parseInline(headingMatch[2].trim()) + "</h" + depth + ">");
            continue;
          }

          const listMatch = line.match(/^(\s*)([-*]|\d+\.)\s+(?:\[( |x|X)\]\s+)?(.+)$/);
          if (listMatch) {
            closeParagraph();

            const indent = (listMatch[1] || "").replace(/\t/g, "    ").length;
            const marker = listMatch[2];
            const taskMark = listMatch[3];
            const text = listMatch[4].trim();
            const listType = /\d+\./.test(marker) ? "ol" : "ul";

            while (listStack.length && indent < listStack[listStack.length - 1].indent) {
              closeTopList();
            }

            if (!listStack.length) {
              openList(listType, indent);
            } else {
              const top = listStack[listStack.length - 1];

              if (indent > top.indent) {
                if (!top.liOpen) {
                  html.push("<li>");
                  top.liOpen = true;
                }
                openList(listType, indent);
              } else if (indent === top.indent) {
                if (top.type !== listType) {
                  closeTopList();
                  openList(listType, indent);
                } else {
                  closeCurrentListItem();
                }
              } else {
                if (!listStack.length || listStack[listStack.length - 1].type !== listType) {
                  openList(listType, indent);
                }
              }
            }

            const current = listStack[listStack.length - 1];
            if (taskMark !== undefined) {
              const checked = taskMark.toLowerCase() === "x";
              html.push(
                '<li class="task-item"><input type="checkbox" disabled' +
                  (checked ? " checked" : "") +
                  " /><span>" +
                  parseInline(text) +
                  "</span>"
              );
            } else {
              html.push("<li>" + parseInline(text));
            }
            current.liOpen = true;
            continue;
          }

          if (listStack.length) {
            closeAllLists();
          }

          paragraph.push(line.trim());
        }

        closeParagraph();
        closeAllLists();
        return html.join("\n");
      }

      function pickJojiTracks(results) {
        const uniqueTracks = new Map();
        for (let i = 0; i < results.length; i += 1) {
          const item = results[i];
          const artistName = normalizeText(item.artistName);
          const trackName = String(item.trackName || "");
          const previewUrl = String(item.previewUrl || "");
          if (artistName.indexOf("joji") === -1 || !trackName || !previewUrl) {
            continue;
          }
          const trackKey = normalizeText(trackName);
          if (!uniqueTracks.has(trackKey)) {
            uniqueTracks.set(trackKey, item);
          }
        }

        const selected = [];
        for (let i = 0; i < JOJI_SEED_TITLES.length; i += 1) {
          const key = normalizeText(JOJI_SEED_TITLES[i]);
          if (!uniqueTracks.has(key)) {
            continue;
          }
          selected.push(uniqueTracks.get(key));
          uniqueTracks.delete(key);
        }

        const leftovers = Array.from(uniqueTracks.values());
        for (let i = 0; i < leftovers.length && selected.length < 6; i += 1) {
          selected.push(leftovers[i]);
        }

        return selected.slice(0, 6);
      }

      function createMusicCard(track) {
        const card = document.createElement("article");
        card.className = "music-card";

        const title = document.createElement("h3");
        title.textContent = String(track.trackName || "Brano Joji");
        card.appendChild(title);

        const meta = document.createElement("p");
        meta.className = "music-meta";
        const parts = [];
        if (track.collectionName) {
          parts.push(String(track.collectionName));
        }
        if (track.trackTimeMillis) {
          parts.push(formatDurationMs(track.trackTimeMillis));
        }
        meta.textContent = parts.length ? parts.join(" · ") : "Anteprima audio";
        card.appendChild(meta);

        const player = document.createElement("audio");
        player.controls = true;
        player.preload = "none";
        player.src = sanitizeUrl(String(track.previewUrl || ""));
        card.appendChild(player);

        const openLink = document.createElement("a");
        openLink.className = "music-open";
        openLink.href = sanitizeUrl(
          String(track.trackViewUrl || track.collectionViewUrl || "https://music.apple.com")
        );
        openLink.target = "_blank";
        openLink.rel = "noopener noreferrer";
        openLink.textContent = "Apri brano completo";
        card.appendChild(openLink);

        return card;
      }

      function renderMusicFallback(container, message) {
        container.innerHTML = "";

        const error = document.createElement("p");
        error.className = "music-error";
        error.textContent = message;
        container.appendChild(error);

        const links = document.createElement("p");
        links.className = "music-links";
        links.innerHTML =
          'Puoi ascoltarlo qui: <a href="https://open.spotify.com/artist/3MZsBdqDrRTJihTHQrO6Dq" target="_blank" rel="noopener noreferrer">Spotify</a> · <a href="https://www.youtube.com/@88rising/search?query=Joji" target="_blank" rel="noopener noreferrer">YouTube</a>.';
        container.appendChild(links);
      }

      async function renderMusicSection() {
        const grid = document.getElementById("musicGrid");
        if (!grid) {
          return;
        }

        try {
          const response = await fetch(JOJI_TRACK_ENDPOINT, { cache: "no-store" });
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }

          const payload = await response.json();
          const tracks = pickJojiTracks(Array.isArray(payload.results) ? payload.results : []);
          if (!tracks.length) {
            throw new Error("Nessun brano disponibile.");
          }

          grid.innerHTML = "";
          for (let i = 0; i < tracks.length; i += 1) {
            grid.appendChild(createMusicCard(tracks[i]));
          }
        } catch (error) {
          renderMusicFallback(
            grid,
            "Non riesco a caricare ora le anteprime audio automatiche."
          );
        }
      }

      function buildToc(container) {
        const toc = document.getElementById("toc");
        toc.innerHTML = "";

        const headings = Array.prototype.slice.call(
          container.querySelectorAll("h1, h2, h3")
        );

        if (!headings.length) {
          toc.innerHTML = "<p>Nessuna sezione trovata.</p>";
          return;
        }

        const seen = {};
        for (let i = 0; i < headings.length; i += 1) {
          const heading = headings[i];
          const base = slugify(heading.textContent || "sezione");
          const count = (seen[base] || 0) + 1;
          seen[base] = count;
          heading.id = count > 1 ? base + "-" + count : base;

          const link = document.createElement("a");
          link.href = "#" + heading.id;
          link.textContent = heading.textContent || heading.id;
          link.className = "toc-level-" + heading.tagName.slice(1);
          toc.appendChild(link);
        }
      }

      function staggerReveal(container) {
        const blocks = Array.prototype.slice.call(container.children);
        for (let i = 0; i < blocks.length; i += 1) {
          blocks[i].style.animationDelay = Math.min(i * 28, 320) + "ms";
        }
      }

      function setupToTopButton() {
        const button = document.getElementById("toTopBtn");
        if (!button) {
          return;
        }

        function toggleVisibility() {
          button.classList.toggle("is-visible", window.scrollY > 360);
        }

        window.addEventListener("scroll", toggleVisibility, { passive: true });
        toggleVisibility();

        button.addEventListener("click", function () {
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      }

      async function fetchMarkdownFile() {
        const candidates = [NOTE_FILE, NOTE_FILE + ".md"];

        for (let i = 0; i < candidates.length; i += 1) {
          const candidate = candidates[i];
          try {
            const response = await fetch(encodeURI(candidate), { cache: "no-store" });
            if (response.ok) {
              return { file: candidate, text: await response.text() };
            }
          } catch (error) {
            // Continue on next candidate.
          }
        }

        throw new Error('Impossibile leggere il markdown. Verifica il file "' + NOTE_FILE + '".');
      }

      async function renderPage() {
        const content = document.getElementById("content");
        const status = document.getElementById("status");

        try {
          const result = await fetchMarkdownFile();
          content.innerHTML = parseMarkdown(result.text);
          buildToc(content);
          staggerReveal(content);

          status.textContent =
            'Markdown caricato da "' + result.file + '" alle ' +
            new Date().toLocaleTimeString("it-IT", {
              hour: "2-digit",
              minute: "2-digit"
            });
        } catch (error) {
          const message = String(error && error.message ? error.message : error);
          content.innerHTML = '<div class="error"><strong>Errore:</strong> ' + escapeHtml(message) + "</div>";
          status.textContent = "Caricamento non riuscito.";
        }
      }

      setupToTopButton();
      renderMusicSection();
      renderPage();
    </script>
  </body>
</html>
